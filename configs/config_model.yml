# Seed
default_seed: 42

# Paths
input_path: "dataset"
data_path: "IGCT"
output_path: "results"

# Training settings
training: True
generate_images: True
conditioned_prior: True
threshold_training: False
clip_grad: False
ema: False
resolution: 32
validation_split: 0.2
test_split: 0.2
loss: "l2"
noise_schedule: "fixed_linear"

# Training parameters
epochs: 2000
noise_steps: 250
batch_size: 4
init_lr: 0.00002
weight_decay: 0.001
threshold: 0.01
sample_number: 3
sample_epoch: 5
ema_decay: 0.999

# Test settings
testing: False
calculate_metrics: False
sample_metrics: True
test_path: "results/UNet_bs(4)_noisesteps(250)_loss(l2)_prior(True)_1"
sample_model: "best_model.pth"
nr_samples: 1

# Model Parameters
model_name: "UNet"  
n_blocks: 4
n_channels: 32